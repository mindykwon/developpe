<style>
  html, body { margin: 0; padding: 0; background: #E8DAD5; min-height: 100vh; font-family: "Pretendard", -apple-system, system-ui, sans-serif; overscroll-behavior: none; }
  * { box-sizing: border-box; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  button:active { opacity: 0.85; }
  input, textarea { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #A88B95; }
  ::-webkit-scrollbar { display: none; }
  * { scrollbar-width: none; }
  .stage {
    min-height: 100vh; width: 100vw;
    display: flex; align-items: center; justify-content: center;
    padding: 17px 28px 50px; position: relative;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(232,180,184,0.35), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(139,74,95,0.12), transparent 60%),
      #E8DAD5;
  }
  .brand-watermark {
    position: fixed; top: 28px; left: 36px;
    font-family: "Playfair Display", serif; font-style: italic;
    font-size: 26px; font-weight: 500; color: rgba(43,31,38,0.32);
    letter-spacing: -0.3px; pointer-events: none;
  }
  .brand-sub {
    position: fixed; bottom: 28px; left: 36px;
    font-size: 11px; color: rgba(43,31,38,0.4);
    letter-spacing: 1.5px; text-transform: uppercase;
    pointer-events: none;
  }
  /* ── 모바일: 전체화면 앱 ── */
  @media (max-width: 500px) {
    html, body { margin: 0; padding: 0; overflow: hidden; background: #FDF6F3; }
    #root { position: fixed; inset: 0; display: flex; flex-direction: column; }
    .stage { flex: 1; display: flex; flex-direction: column; padding: 0; background: #FDF6F3; }
    .brand-watermark, .brand-sub, #tweaks { display: none !important; }
    input, textarea, select { font-size: 16px !important; }
  }
  .tweaks {
    position: fixed; right: 24px; top: 24px;
    width: 260px; z-index: 200;
    background: rgba(253,246,243,0.95);
    backdrop-filter: blur(16px);
    border: 0.5px solid rgba(43,31,38,0.12);
    border-radius: 14px; padding: 14px;
    box-shadow: 0 12px 36px rgba(43,31,38,0.15);
    font-family: "Pretendard", sans-serif; font-size: 12px;
    color: #2B1F26; display: none;
  }
  .tweaks.open { display: block; }
  .tweaks h4 { margin: 0 0 10px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #8B4A5F; }
  .tweaks .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; }
  .tweaks .row label { flex: 1; }
  .tweaks select, .tweaks button { font-size: 12px; padding: 5px 8px; border-radius: 6px; border: 0.5px solid rgba(43,31,38,0.2); background: #fff; color: #2B1F26; cursor: pointer; }
  .tweaks .seg { display: flex; gap: 2px; background: #F7E4E1; padding: 2px; border-radius: 6px; }
  .tweaks .seg button { border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; background: transparent; }
  .tweaks .seg button.on { background: #fff; color: #8B4A5F; font-weight: 600; }
  .screen-jump { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 8px; }
  .screen-jump button { padding: 6px 4px; font-size: 11px; text-align: left; }
</style>
</head>
<body>
<div id="root"></div>
<div class="brand-watermark">Développé · iOS</div>

      <button data-theme="light" class="on">Light</button>
      <button data-theme="dark">Dark</button>
    </div>
  </div>
  <div class="row"><label>Accent</label>
    <select id="accentSel">

    chevron: <>{P('M9 5l7 7-7 7')}</>,
    chevronDown: <>{P('M5 9l7 7 7-7')}</>,

    dot:     <circle cx="12" cy="12" r="2" fill={color} />,

    studio:  <>{P('M4 11l8-6 8 6v9H4z')}{P('M10 20v-5h4v5')}</>,
    teacher: <>{P('M12 12a4 4 0 100-8 4 4 0 000 8z')}{P('M4 20c0-4 4-6 8-6s8 2 8 6')}</>,

    gear:    <>{P('M12 15a3 3 0 100-6 3 3 0 000 6z')}{P('M19 12a7 7 0 00-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 00-2-1.2L14 3h-4l-.6 2.6a7 7 0 00-2 1.2l-2.3-.9-2 3.4 2 1.5a7 7 0 000 2.4l-2 1.5 2 3.4 2.3-.9a7 7 0 002 1.2L10 21h4l.6-2.6a7 7 0 002-1.2l2.3.9 2-3.4-2-1.5c.07-.4.1-.8.1-1.2z')}</>,

}

function Button({ children, onClick, variant = 'primary', full, icon, style = {} }) {
  const t = window.theme;
  const styles = {
    primary:   { bg: t.colors.primaryDeep, fg: '#FFFFFF' },
    secondary: { bg: t.colors.surface, fg: t.colors.primaryDeep },
    ghost:     { bg: 'transparent', fg: t.colors.primaryDeep },
  }[variant];
  return (
    <button
      onClick={onClick}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        gap: 6, width: full ? '100%' : undefined,
        padding: '13px 18px', borderRadius: t.radius.button,
        background: styles.bg, color: styles.fg,
        border: 'none', cursor: 'pointer',
        fontFamily: t.font.sans, fontSize: 15, fontWeight: 600,
        letterSpacing: -0.2,
        ...style,
      }}
    >
      {icon && <Icon name={icon} size={18} color={styles.fg} />}
      {children}
    </button>
  );
}

const IS_MOBILE = typeof window !== 'undefined' && window.matchMedia('(max-width: 500px)').matches;

function PhoneShell({ children, dark = false }) {
  const bg = dark ? '#1A1317' : window.theme.colors.background;

  // 모바일: 프레임 없이 전체화면
  if (IS_MOBILE) {
    return (
      <div style={{
        flex: 1, width: '100%',
        display: 'flex', flexDirection: 'column',
        background: bg,
        fontFamily: window.theme.font.sans,
        color: window.theme.colors.textPrimary,
        WebkitFontSmoothing: 'antialiased',
        paddingTop: 'env(safe-area-inset-top)',
        overflow: 'hidden',
      }}>
        {children}
      </div>
    );
  }

  // 데스크탑: 기존 폰 프레임
  return (
    <div style={{
      width: 390, height: 844,
      borderRadius: 54, overflow: 'hidden', position: 'relative',
      background: bg,
      boxShadow:
        '0 0 0 2px #1a1010, 0 0 0 14px #2a1f24, 0 40px 80px rgba(40,20,28,0.25), 0 0 0 15px rgba(255,255,255,0.06)',
      fontFamily: window.theme.font.sans,
      color: window.theme.colors.textPrimary,
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 120, height: 35, borderRadius: 22, background: '#000', zIndex: 60,
      }} />
      <StatusBar dark={dark} />
      <div style={{
        position: 'absolute', inset: 0, paddingTop: 54,
        display: 'flex', flexDirection: 'column',
      }}>
        {children}
      </div>
      <div style={{
        position: 'absolute', bottom: 8, left: 0, right: 0, zIndex: 70,
        display: 'flex', justifyContent: 'center', pointerEvents: 'none',
      }}>
        <div style={{
          width: 134, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.5)' : 'rgba(43,31,38,0.45)',
        }} />
      </div>
    </div>
  );
}

function StatusBar({ dark }) {
  const c = dark ? '#fff' : window.theme.colors.textPrimary;
  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, height: 54, zIndex: 50,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '18px 34px 0', pointerEvents: 'none',

function formatDate(iso, opts = {}) {
  const d = new Date(iso);
  const Y = d.getFullYear(); const M = d.getMonth() + 1; const D = d.getDate();
  const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
  const w = weekdays[d.getDay()];
  if (opts.short) return `${M}월 ${D}일 (${w})`;
  if (opts.long)  return `${Y}년 ${M}월 ${D}일 ${w}요일`;
  return `${Y}.${String(M).padStart(2,'0')}.${String(D).padStart(2,'0')}`;
}
function formatRelative(iso) {
  const now = new Date('2026-04-19T12:00:00');
  const d = new Date(iso);
  const days = Math.floor((now - d) / 86400000);
  if (days === 0) return '오늘';
  if (days === 1) return '어제';
  if (days < 7) return `${days}일 전`;
  if (days < 30) return `${Math.floor(days / 7)}주 전`;
  return formatDate(iso, { short: true });
}
function formatTime(iso) {
  const d = new Date(iso);
  const h = d.getHours(); const m = d.getMinutes();
  const ampm = h < 12 ? '오전' : '오후';
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${ampm} ${h12}:${String(m).padStart(2,'0')}`;
}

<script type="text/babel">
const { useState, useMemo, useEffect, useRef, Fragment } = React;

// ═════════ S1. Home ═══════════════════════════════════════════
function HomeScreen({ store, nav }) {

function AttendanceStats({ sessions }) {
  const t = window.theme;
  const [mode, setMode] = useState('month');

  const { buckets, currentIdx } = useMemo(() => {
    const refStr = sessions.map(s => s.date).sort().slice(-1)[0] || new Date().toISOString().slice(0, 10);
    const refDate = parseISO(refStr);

    if (mode === 'year') {
      const out = [];
      for (let i = 3; i >= 0; i--) {
        const y = refDate.getFullYear() - i;
        out.push({ key: String(y), label: String(y), count: 0 });
      }
      sessions.forEach(s => {
        const k = s.date.slice(0, 4);
        const b = out.find(x => x.key === k);
        if (b) b.count += 1;
      });
      return { buckets: out, currentIdx: out.length - 1 };
    }
    if (mode === 'month') {
      const out = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(refDate.getFullYear(), refDate.getMonth() - i, 1);
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        out.push({ key, label: `${d.getMonth() + 1}월`, count: 0 });
      }
      sessions.forEach(s => {
        const k = s.date.slice(0, 7);
        const b = out.find(x => x.key === k);
        if (b) b.count += 1;
      });
      return { buckets: out, currentIdx: out.length - 1 };
    }
    const out = [];
    const refMon = mondayOf(refDate);
    for (let i = 7; i >= 0; i--) {
      const d = new Date(refMon.getFullYear(), refMon.getMonth(), refMon.getDate() - i * 7);
      const key = ymd(d);
      const label = `${d.getMonth() + 1}/${d.getDate()}`;
      out.push({ key, label, count: 0 });
    }
    sessions.forEach(s => {
      const d = parseISO(s.date);
      const mon = mondayOf(d);
      const k = ymd(mon);
      const b = out.find(x => x.key === k);
      if (b) b.count += 1;
    });
    return { buckets: out, currentIdx: out.length - 1 };
  }, [sessions, mode]);

  const max = Math.max(1, ...buckets.map(b => b.count));
  const current = buckets[currentIdx];
  const prev = buckets[currentIdx - 1];
  const delta = current && prev ? current.count - prev.count : 0;
  const total = buckets.reduce((n, b) => n + b.count, 0);

  const modeCopy = {
    year:  { current: '올해',    range: '최근 4년',   prev: '작년 대비' },
    month: { current: '이번 달',  range: '최근 6개월', prev: '지난달 대비' },
    week:  { current: '이번 주',  range: '최근 8주',   prev: '지난주 대비' },
  }[mode];

  return (
    <div style={{
      background: t.colors.surfaceAlt, borderRadius: t.radius.card,
      border: `0.5px solid ${t.colors.border}`,
      padding: '14px 16px 16px',
      display: 'flex', flexDirection: 'column', gap: 12,
      fontFamily: t.font.sans,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
        <div style={{
          display: 'flex', background: t.colors.background, borderRadius: 8, padding: 2,
          border: `0.5px solid ${t.colors.border}`,
        }}>
          {[{ k: 'year', l: 'Year' }, { k: 'month', l: 'Month' }, { k: 'week', l: 'Week' }].map(o => (
            <button key={o.k} onClick={() => setMode(o.k)} style={{
              padding: '5px 11px', border: 'none', borderRadius: 6, cursor: 'pointer',
              background: mode === o.k ? t.colors.surfaceAlt : 'transparent',
              color: mode === o.k ? t.colors.primaryDeep : t.colors.textMuted,
              fontFamily: t.font.sans, fontSize: 12, fontWeight: 600,
              letterSpacing: 0.2,
              boxShadow: mode === o.k ? '0 1px 2px rgba(43,31,38,0.08)' : 'none',
            }}>{o.l}</button>
          ))}
        </div>
        <span style={{
          fontSize: 11, color: t.colors.textMuted, letterSpacing: 0.3,
          textTransform: 'uppercase', fontWeight: 500,
        }}>
          {modeCopy.range} · 총 {total}회
        </span>
      </div>

      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
        <span style={{
          fontFamily: t.font.serif, fontSize: 42, fontWeight: 600,
          color: t.colors.textPrimary, letterSpacing: -1.5, lineHeight: 1,
          fontVariantNumeric: 'tabular-nums',
        }}>{current?.count ?? 0}</span>
        <span style={{ fontSize: 13, color: t.colors.textSecondary, letterSpacing: -0.1 }}>
          {modeCopy.current} 클래스
        </span>
        {prev && (
          <span style={{
            marginLeft: 'auto', fontSize: 12, fontWeight: 600,
            color: delta > 0 ? t.colors.success : delta < 0 ? t.colors.danger : t.colors.textMuted,
            letterSpacing: -0.1, fontVariantNumeric: 'tabular-nums',
          }}>
            {delta > 0 ? '↑' : delta < 0 ? '↓' : '→'} {delta === 0 ? '변화 없음' : `${Math.abs(delta)}회`}
          </span>
        )}
      </div>

      <div style={{
        display: 'flex', alignItems: 'flex-end',
        gap: mode === 'year' ? 12 : mode === 'month' ? 8 : 5,
        height: 56,
      }}>
        {buckets.map((b, i) => {
          const h = (b.count / max) * 100;
          const isCurrent = i === currentIdx;
          return (
            <div key={b.key} style={{
              flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              minWidth: 0,
            }}>
              <div style={{ width: '100%', height: 40, display: 'flex', alignItems: 'flex-end' }}>
                <div style={{
                  width: '100%',
                  height: b.count === 0 ? 2 : `${Math.max(8, h)}%`,
                  background: isCurrent ? t.colors.primaryDeep
                          : b.count === 0 ? t.colors.border
                          : t.colors.primary,
                  borderRadius: 3,
                  position: 'relative',
                }}>
                  {b.count > 0 && (
                    <span style={{
                      position: 'absolute', top: -14, left: '50%', transform: 'translateX(-50%)',
                      fontSize: 10, fontWeight: 600, color: isCurrent ? t.colors.primaryDeep : t.colors.textMuted,
                      fontVariantNumeric: 'tabular-nums',
                    }}>{b.count}</span>
                  )}
                </div>
              </div>
              <span style={{
                fontSize: 10, color: isCurrent ? t.colors.textPrimary : t.colors.textMuted,
                fontWeight: isCurrent ? 600 : 500, letterSpacing: -0.1,
                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                width: '100%', textAlign: 'center',
              }}>{b.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function parseISO(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function ymd(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function mondayOf(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff);
}

        </div>
      </div>

  useEffect(() => {
    if (!studioInitialized.current) { studioInitialized.current = true; return; }
    const filtered = store.teachers.filter(tc => tc.studioId === studioId);
    if (filtered.length === 1) setTeacherId(filtered[0].id);
    else if (!filtered.find(tc => tc.id === teacherId)) setTeacherId(null);
  }, [studioId]);

  useEffect(() => {
    if (store.levels.length === 1 && !levelId) setLevelId(store.levels[0].id);
  }, []);

  const save = () => {
    if (editing) {
      store.updateSession(editing.id, { date, studioId, teacherId, levelId, notes });
      nav.back();
    } else {
      const id = store.createSession({ date, studioId, teacherId, levelId, notes });
      nav.replace('class-detail', { id });
    }
  };

  const valid = !!date;

  return (
    <>
      <div style={{
        flexShrink: 0, padding: `4px ${t.space.screen}px 8px`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        minHeight: 44, gap: 12,
      }}>
        <button onClick={() => nav.back()} style={{
          color: t.colors.primaryDeep, background: 'transparent', border: 'none',
          padding: '6px 0', fontSize: 15, cursor: 'pointer', fontFamily: t.font.sans,
          whiteSpace: 'nowrap', flexShrink: 0,
        }}>취소</button>
        <span style={{ fontFamily: t.font.serif, fontWeight: 600, fontSize: 17, whiteSpace: 'nowrap' }}>{editing ? '수업 수정' : '새 수업'}</span>
        <button onClick={save} disabled={!valid} style={{
          color: valid ? t.colors.primaryDeep : t.colors.textMuted,
          background: 'transparent', border: 'none', padding: '6px 0',
          fontSize: 15, fontWeight: 600, cursor: valid ? 'pointer' : 'default',
          fontFamily: t.font.sans, whiteSpace: 'nowrap', flexShrink: 0,
        }}>저장</button>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', paddingBottom: IS_MOBILE ? 120 : 40 }}>
        <div style={{ padding: `16px ${t.space.screen}px` }}>
          <FormCard>
            <FormRow label="날짜" icon="calendar">
              <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle(t)} />
            </FormRow>
            <FormRow label="학원" icon="studio" last={!showTeacherRow && !showLevelRow}>
              <SelectOrCreate
                options={store.studios.map(s => ({ value: s.id, label: s.name }))}
                value={studioId} onChange={setStudioId}
                placeholder="선택 또는 추가"
              />
            </FormRow>
            {showTeacherRow && (
              <FormRow label="선생님" icon="teacher" last={!showLevelRow}>
                <SelectOrCreate
                  options={studioTeachers.map(x => ({ value: x.id, label: x.name, sub: !studioId ? store.studios.find(s => s.id === x.studioId)?.name : undefined }))}
                  value={teacherId} onChange={setTeacherId}
                  placeholder="선택 또는 추가"
                />
              </FormRow>
            )}
            {showLevelRow && (
              <FormRow label="레벨" icon="level" last>
                <SelectOrCreate
                  options={store.levels.map(l => ({ value: l.id, label: l.name }))}
                  value={levelId} onChange={setLevelId}
                  placeholder="선택"
                />
              </FormRow>
            )}
          </FormCard>
          <div style={{ height: 16 }} />
          <FlowTabs section={section} onChange={setSection} />
          <div style={{ height: 10 }} />
          <FlowList
            movements={window.MOVEMENTS[section]}
            notes={notes}
            onChange={(key, val) => setNotes(n => ({ ...n, [key]: val }))}
          />
        </div>
      </div>
    </>
  );
}

function FlowList({ movements, notes, onChange }) {
  const t = window.theme;
  return (
    <div style={{
      background: t.colors.surfaceAlt, borderRadius: t.radius.card,
      border: `0.5px solid ${t.colors.border}`,
    }}>
      {movements.map((m, i) => (
        <FlowRow
          key={m.key}
          movement={m}
          index={i}
          isLast={i === movements.length - 1}

function FlowRow({ movement: m, index: i, isLast, comments, onChange }) {
  const t = window.theme;
  const [draft, setDraft] = useState('');
  const filled = comments.length > 0;

  const commit = () => {
    const trimmed = draft.trim();
    if (!trimmed) return;
    onChange([...comments, trimmed]);
    setDraft('');
  };

  const removeAt = (idx) => {
    onChange(comments.filter((_, j) => j !== idx));
  };

  return (
    <div style={{
      display: 'flex', alignItems: 'flex-start', gap: 10,
      padding: isLast ? '12px 14px 16px' : '12px 14px',
      borderBottom: isLast ? 'none' : `0.5px solid ${t.colors.border}`,
    }}>
      <div style={{
        flexShrink: 0, width: 22, height: 22, borderRadius: 11,
        border: `1px solid ${filled ? t.colors.primaryDeep : t.colors.border}`,
        background: filled ? t.colors.primaryDeep : 'transparent',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginTop: 2, fontFamily: t.font.serif, fontSize: 11, fontWeight: 600,
        color: filled ? t.colors.surface : t.colors.textMuted,
      }}>{i + 1}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, flexWrap: 'wrap', marginBottom: comments.length ? 6 : 4, rowGap: 2, lineHeight: 1.25 }}>
          <span style={{
            fontFamily: t.font.serif, fontSize: 14, fontWeight: 600,
            color: t.colors.textPrimary, letterSpacing: -0.1,
            whiteSpace: 'nowrap',
          }}>{m.en}</span>
          <span style={{ fontSize: 11, color: t.colors.textMuted, whiteSpace: 'nowrap' }}>· {m.ko}</span>
        </div>
        {comments.length > 0 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, marginBottom: 6 }}>
            {comments.map((c, j) => (
              <div key={j} style={{
                display: 'flex', alignItems: 'flex-start', gap: 8,
                padding: '7px 10px',
                background: t.colors.surface,
                borderRadius: 8,
              }}>
                <span style={{
                  flexShrink: 0, color: t.colors.primaryDeep,
                  fontSize: 13, fontWeight: 600, marginTop: 1,
                }}>·</span>
                <span style={{
                  flex: 1, fontSize: 14, lineHeight: 1.5,
                  color: t.colors.textPrimary, wordBreak: 'break-word',
                }}>{c}</span>
                <button onClick={() => removeAt(j)} style={{
                  flexShrink: 0, border: 'none', background: 'transparent',
                  padding: 0, cursor: 'pointer', color: t.colors.textMuted,
                  fontSize: 13, marginTop: 1, lineHeight: 1,
                }} aria-label="삭제">×</button>
              </div>
            ))}
          </div>
        )}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <input
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter') { e.preventDefault(); commit(); }
            }}
            placeholder={comments.length ? '코멘트 추가…' : '메모 입력 후 Enter'}
            style={{
              flex: 1, border: 'none', outline: 'none',
              fontFamily: t.font.sans, fontSize: 14,
              color: t.colors.textPrimary, background: 'transparent',
              padding: 0, minWidth: 0,
            }}
          />
          {draft.trim() && (
            <button onClick={commit} style={{
              flexShrink: 0, border: 'none', background: t.colors.primaryDeep,
              color: t.colors.surface, fontSize: 12, fontWeight: 600,
              padding: '4px 10px', borderRadius: 6, cursor: 'pointer',
              fontFamily: t.font.sans,
            }}>추가</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ═════════ S4. Feedback New (2-step modal) ════════════════════
function FeedbackNewScreen({ store, nav, params }) {
  const t = window.theme;
  const [step, setStep] = useState(1);
  const [moveKey, setMoveKey] = useState(null);
  const [body, setBody] = useState('');
  const [cat, setCat] = useState('barre');
  const [continuousMode, setContinuousMode] = useState(false);

  const session = store.sessions.find(s => s.id === params.sessionId);
  const usedKeys = useMemo(() => new Set(
    store.feedback.filter(f => f.sessionId === params.sessionId).map(f => f.movementKey)
  ), [store.feedback, params.sessionId]);

  const save = () => {
    store.createFeedback({ sessionId: params.sessionId, movementKey: moveKey, body });
    if (continuousMode) {
      setStep(1); setMoveKey(null); setBody('');
    } else {
      nav.back();
    }
  };

  return (
    <>
      <div style={{
        flexShrink: 0, padding: `4px ${t.space.screen}px 8px`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        minHeight: 44, gap: 12,
      }}>
        <button onClick={() => step === 2 ? setStep(1) : nav.back()} style={{
          color: t.colors.primaryDeep, background: 'transparent', border: 'none',
          padding: '6px 0', fontSize: 15, cursor: 'pointer', fontFamily: t.font.sans,
          display: 'flex', alignItems: 'center', gap: 2,
          whiteSpace: 'nowrap', flexShrink: 0,
        }}>
          {step === 2 && <Icon name="back" size={20} />}
          {step === 2 ? '동작' : '취소'}
        </button>
        <span style={{ fontFamily: t.font.serif, fontWeight: 600, fontSize: 17, whiteSpace: 'nowrap' }}>
          {step === 1 ? '동작 선택' : '피드백'}
        </span>
        <button onClick={save} disabled={!moveKey || !body.trim() || step === 1} style={{
          color: (moveKey && body.trim() && step === 2) ? t.colors.primaryDeep : t.colors.textMuted,
          background: 'transparent', border: 'none', padding: '6px 0',
          fontSize: 15, fontWeight: 600, fontFamily: t.font.sans,
          cursor: (moveKey && body.trim() && step === 2) ? 'pointer' : 'default',
          whiteSpace: 'nowrap', flexShrink: 0,
        }}>저장</button>

  const [dragIdx, setDragIdx] = useState(null);
  const [adding, setAdding] = useState(false);
  const [newEn, setNewEn] = useState('');
  const [newKo, setNewKo] = useState('');
  const dragRef = useRef(null);
  const storeRef = useRef(store);
  const catRef = useRef(cat);
  storeRef.current = store;
  catRef.current = cat;

  const list = store.movements[cat];

  const counts = useMemo(() => {
    const m = {};
    store.sessions.forEach(s => {
      const notes = s.notes || {};
      Object.keys(notes).forEach(k => {
        const arr = Array.isArray(notes[k]) ? notes[k] : [];
        if (arr.length === 0) return;
        if (!m[k]) m[k] = { count: 0, last: '' };
        m[k].count += arr.length;
        if (s.date > m[k].last) m[k].last = s.date;
      });
    });
    return m;
  }, [store.sessions]);

  // 터치 드래그 이벤트를 passive:false로 등록 (스크롤 방지)
  useEffect(() => {
    if (!editMode) return;
    const onMove = (e) => {
      if (!dragRef.current) return;
      e.preventDefault();
      const { idx, lastY } = dragRef.current;
      const y = e.touches[0].clientY;
      const delta = y - lastY;
      const THRESH = 40;
      const currentList = storeRef.current.movements[catRef.current];
      if (delta > THRESH && idx < currentList.length - 1) {
        storeRef.current.moveMovement(catRef.current, idx, 1);
        dragRef.current = { idx: idx + 1, lastY: y };
        setDragIdx(idx + 1);
      } else if (delta < -THRESH && idx > 0) {
        storeRef.current.moveMovement(catRef.current, idx, -1);
        dragRef.current = { idx: idx - 1, lastY: y };
        setDragIdx(idx - 1);
      }
    };
    const onEnd = () => { dragRef.current = null; setDragIdx(null); };
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    return () => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    };
  }, [editMode]);

  const handleAdd = () => {
    if (!newEn.trim()) return;
    const base = newEn.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'move';

                cursor: 'pointer', letterSpacing: -0.1,
                boxShadow: cat === c.key ? '0 1px 3px rgba(43,31,38,0.08)' : 'none',
                whiteSpace: 'nowrap', minWidth: 0,
              }}>
                {c.label} <span style={{ fontWeight: 400, fontSize: 11, opacity: 0.7 }}>· {c.sub}</span>
              </button>
            ))}
          </div>
          <button onClick={() => { setEditMode(e => !e); setAdding(false); dragRef.current = null; setDragIdx(null); }} style={{
            background: editMode ? t.colors.primaryDeep : 'transparent',
            color: editMode ? '#fff' : t.colors.primaryDeep,
            border: editMode ? 'none' : `1px solid ${t.colors.primary}`,
            borderRadius: 8, padding: '0 12px', cursor: 'pointer',
            fontFamily: t.font.sans, fontSize: 13, fontWeight: 600,
            height: 36, display: 'inline-flex', alignItems: 'center',
            flexShrink: 0, WebkitAppearance: 'none', appearance: 'none',
          }}>
            {editMode ? '완료' : '편집'}

        </div>
      </div>
      <div style={{ flex: 1, overflowY: editMode ? 'hidden' : 'auto', paddingBottom: IS_MOBILE ? 120 : 30, overscrollBehavior: 'none' }}>
        <div style={{ padding: `0 ${t.space.screen}px` }}>
          <div style={{
            background: t.colors.surfaceAlt, borderRadius: t.radius.card,
            border: `0.5px solid ${t.colors.border}`, overflow: 'hidden',
          }}>
            {list.map((m, i) => {
              const c = counts[m.key] || { count: 0, last: '' };
              const borderBottom = `0.5px solid ${t.colors.border}`;
              const isDragging = dragIdx === i;

              if (editMode) {
                return (
                  <div key={m.key} style={{
                    display: 'flex', alignItems: 'center', gap: 8,
                    padding: '10px 14px', borderBottom,

                    userSelect: 'none', WebkitUserSelect: 'none',
                  }}>
                    <div
                      onTouchStart={e => {
                        e.stopPropagation();
                        dragRef.current = { idx: i, lastY: e.touches[0].clientY };

                      style={{ flexShrink: 0, padding: '6px 4px', touchAction: 'none', cursor: 'grab', color: t.colors.textMuted, display: 'flex', alignItems: 'center' }}

                      />
                      <span style={{ color: t.colors.textMuted, fontSize: 12, flexShrink: 0 }}>·</span>
                      <input
                        value={m.ko}
                        onChange={e => store.updateMovementName(cat, m.key, m.en, e.target.value)}

                          flex: 1, border: 'none', outline: 'none', background: t.colors.surface,

                      />
                    </div>
                  </div>

              }

              const isLast = i === list.length - 1;
              return (
                <button key={m.key} onClick={() => nav.push('movement-detail', { key: m.key })} style={{
                  width: '100%', textAlign: 'left', background: 'transparent',

                  padding: '14px 14px', gap: 10,
                  borderBottom: isLast ? 'none' : borderBottom,

                }}>
                  <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 4 }}>
                    <MovementName en={m.en} ko={m.ko} size={15} weight={600} />
                    <div style={{ fontSize: 12, color: t.colors.textMuted, letterSpacing: -0.1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {c.count > 0 ? `${c.count}건 · 마지막 ${formatRelative(c.last)}` : '기록 없음'}

// ─── Keyword clustering ───────────────────────────────────────
const KR_PARTICLES = /(은|는|이|가|을|를|에서|에게|에|의|도|만|과|와|으로|로|라고|라는|라|이라|까지|부터|보다|처럼|마다|조차|이나|나|이며|며|이고|고|지만|이지만|한테|께|께서|씨|님)$/;
const REJECT_SUFFIX = /(하기|되기|시기|지기|기기|히|게|서|며|면서|면|다|자|구나|네|잖|해짐|됨|함|님)$/;
const VERB_NOUNS = new Set([
  '쓰기','하기','되기','보기','가기','오기','먹기','듣기','말기','두기','놓기','쥐기','잡기',
  '서기','앉기','눕기','열기','닫기','밀기','풀기','숙이기','펴기','접기','돌기','내리기','올리기',
  '뜨기','감기','빼기','넣기','찍기','맞추기','잡아두기','느끼기','생각하기','유지하기','말하기',
  '바라보기','당기기','돌리기','낮추기','높이기','받치기','움직이기','벌리기','조이기','푸시기',
  '안기','차기','때기','떼기','빠지기','돌아오기','이기',
]);
const STOPWORDS = new Set([
  '그리고','하지만','그런데','그래서','또는','또한','즉','다만','물론',
  '그때','지금','오늘','내일','어제','다음','이번','저번','처음','마지막','나중','동안','사이',
  '조금','많이','좀','너무','정말','진짜','아직','계속','자꾸','바로','다시','같이','함께',
  '가장','제일','더욱','훨씬','매우','꽤','약간','거의','완전','살짝','확실','성급',
  '그것','이것','저것','여기','저기','거기','이쪽','저쪽','그쪽','모든','몇','것','때','곳','수','점',
  '그','이','저','누구','무엇','어디','어떤','어느',
  '앞','뒤','위','아래','옆','안','밖','쪽','중간','사이','옆면','윗면','아랫면',
  '앞으로','뒤로','위로','아래로','옆으로','안으로','밖으로',
  '필요','가능','불가','정도','만큼','때문','덕분','까지','부터',
  '우선','먼저','다음에','이후','이전','전에','후에',
  '시작','끝','유지','적응','준비','진행','확인','개선','반복','연습',
]);

function extractKeywords(s) {
  if (!s) return [];
  const raw = s.split(/[^가-힯ㄱ-ㆎa-zA-Z0-9]+/).filter(Boolean);
  const out = new Set();
  for (const tok of raw) {
    let w = tok;
    const p = w.match(KR_PARTICLES);
    if (p && w.length - p[0].length >= 2) w = w.slice(0, w.length - p[0].length);
    if (VERB_NOUNS.has(w)) continue;
    if (REJECT_SUFFIX.test(w)) continue;
    if (w.length <= 3 && w.endsWith('기')) continue;
    if (/^[0-9]+$/.test(w)) continue;
    if (w.length < 2) continue;
    if (STOPWORDS.has(w)) continue;
    out.add(w);
  }
  return [...out];
}

function clusterComments(comments) {
  if (!comments.length) return [];
  const tokens = comments.map(extractKeywords);
  const df = new Map();
  tokens.forEach(toks => toks.forEach(k => df.set(k, (df.get(k) || 0) + 1)));
  const assign = comments.map((_, i) => {
    const toks = tokens[i];
    let best = null;
    for (const k of toks) {
      const d = df.get(k) || 0;
      if (d < 2) continue;
      if (!best || d > best.d || (d === best.d && k.length > best.k.length) || (d === best.d && k.length === best.k.length && k < best.k)) {
        best = { k, d };
      }
    }
    return best ? best.k : null;
  });
  const groups = new Map();
  comments.forEach((c, i) => {
    const key = assign[i] || '__other__';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(c);
  });
  const out = [];
  const other = groups.get('__other__');
  groups.delete('__other__');
  [...groups.entries()]
    .sort((a, b) => b[1].length - a[1].length || a[0].localeCompare(b[0]))
    .forEach(([k, arr]) => out.push({ label: k, items: arr }));
  if (other?.length) out.push({ label: '기타', items: other, isOther: true });
  return out;
}

    store.sessions
      .slice()

      .forEach(s => {
        const arr = s.notes?.[params.key];
        if (Array.isArray(arr)) arr.forEach(c => out.push(c));
      });
    return out;
  }, [store.sessions, params.key]);

  const clusters = useMemo(() => clusterComments(allComments), [allComments]);
  const total = allComments.length;

  return (
    <>
      <ScreenHeader title={mv?.en || ''} subtitle={`${mv?.ko} · 누적 ${total}건`} onBack={() => nav.back()} />
      <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 24 }}>
        <div style={{ padding: `8px ${t.space.screen}px 0` }}>
          {clusters.length === 0 ? (
            <EmptyState title="아직 기록이 없습니다" subtitle="이 동작에 대한 메모가 쌓이면 키워드별로 묶어드려요." />
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {clusters.map(cl => (
                <div key={cl.label} style={{
                  background: t.colors.surfaceAlt, borderRadius: t.radius.card,
                  border: `0.5px solid ${t.colors.border}`, padding: '14px 16px',
                  display: 'flex', flexDirection: 'column', gap: 10,
                }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                    <span style={{
                      fontFamily: t.font.serif, fontSize: 16, fontWeight: 600,
                      color: cl.isOther ? t.colors.textSecondary : t.colors.primaryDeep,
                      letterSpacing: -0.2,
                      fontStyle: cl.isOther ? 'italic' : 'normal',
                    }}>{cl.label}</span>
                    <span style={{
                      fontSize: 11, color: t.colors.textMuted, fontWeight: 500,
                      letterSpacing: 0.3, fontVariantNumeric: 'tabular-nums',
                    }}>{cl.items.length}건</span>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {cl.items.map((c, i) => (
                      <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                        <span style={{
                          flexShrink: 0, color: t.colors.primaryDeep,
                          fontSize: 14, fontWeight: 600, lineHeight: 1.55,
                        }}>·</span>
                        <span style={{
                          flex: 1, fontSize: 14.5, lineHeight: 1.55,
                          color: t.colors.textPrimary, whiteSpace: 'pre-wrap',
                          wordBreak: 'break-word', letterSpacing: -0.1,
                        }}>{c}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── 학원 관리 (선생님 포함) ────────────────────────────────────
function StudioManagerScreen({ store, nav }) {
  const t = window.theme;
  const [editStudioId, setEditStudioId] = useState(null);
  const [studioForm, setStudioForm] = useState({ name: '', memo: '' });
  const [deleteStudioId, setDeleteStudioId] = useState(null);
  const [editTeacherId, setEditTeacherId] = useState(null);
  const [teacherForm, setTeacherForm] = useState({ name: '' });
  const [deleteTeacherId, setDeleteTeacherId] = useState(null);

  const cancelAll = () => {
    setEditStudioId(null); setDeleteStudioId(null);
    setEditTeacherId(null); setDeleteTeacherId(null);
  };

  const startEditStudio = (s) => { cancelAll(); setEditStudioId(s.id); setStudioForm({ name: s.name, memo: s.memo || '' }); };
  const startNewStudio  = () => { cancelAll(); setEditStudioId('new'); setStudioForm({ name: '', memo: '' }); };
  const saveStudio = () => {
    if (!studioForm.name.trim()) return;
    if (editStudioId === 'new') store.createStudio({ name: studioForm.name.trim(), memo: studioForm.memo.trim() });
    else store.updateStudio(editStudioId, { name: studioForm.name.trim(), memo: studioForm.memo.trim() });
    setEditStudioId(null);
  };
  const tryDeleteStudio = (id) => {
    if (deleteStudioId === id) { store.deleteStudio(id); setDeleteStudioId(null); }
    else { cancelAll(); setDeleteStudioId(id); }
  };

  const startEditTeacher = (tc) => { cancelAll(); setEditTeacherId(tc.id); setTeacherForm({ name: tc.name }); };
  const startNewTeacher  = (studioId) => { cancelAll(); setEditTeacherId(`new-${studioId}`); setTeacherForm({ name: '' }); };
  const saveTeacher = (studioId) => {
    if (!teacherForm.name.trim()) return;
    if (typeof editTeacherId === 'string' && editTeacherId.startsWith('new-'))
      store.createTeacher({ name: teacherForm.name.trim(), studioId });
    else store.updateTeacher(editTeacherId, { name: teacherForm.name.trim() });
    setEditTeacherId(null);
  };
  const tryDeleteTeacher = (id) => {
    if (deleteTeacherId === id) { store.deleteTeacher(id); setDeleteTeacherId(null); }
    else { cancelAll(); setDeleteTeacherId(id); }
  };

  return (
    <>
      <ScreenHeader title="학원 관리" onBack={() => nav.back()} />
      <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 24 }}>
        <div style={{ padding: `8px ${t.space.screen}px 0`, display: 'flex', flexDirection: 'column', gap: 10 }}>
          {store.studios.map(s => {
            const studioTeachers = store.teachers.filter(tc => tc.studioId === s.id);
            const isEditingStudio = editStudioId === s.id;
            const isDeletingStudio = deleteStudioId === s.id;
            const isAddingTeacher = editTeacherId === `new-${s.id}`;
            return (
              <div key={s.id} style={{ background: t.colors.surfaceAlt, borderRadius: t.radius.card, border: `0.5px solid ${t.colors.border}`, overflow: 'hidden' }}>
                {isEditingStudio ? (
                  <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <input autoFocus value={studioForm.name} onChange={e => setStudioForm(f => ({ ...f, name: e.target.value }))}
                      placeholder="학원 이름" style={mgmtInputStyle(t)} />
                    <input value={studioForm.memo} onChange={e => setStudioForm(f => ({ ...f, memo: e.target.value }))}
                      placeholder="지역 메모 (예: 강남)" style={{ ...mgmtInputStyle(t), fontSize: 13, color: t.colors.textSecondary }} />
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                      <MgmtCancelBtn onClick={() => setEditStudioId(null)} /><MgmtSaveBtn onClick={saveStudio} />
                    </div>
                  </div>
                ) : (
                  <div style={{ padding: '14px 14px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: `0.5px solid ${t.colors.border}` }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 15, fontWeight: 600, color: t.colors.textPrimary }}>{s.name}</div>
                      {s.memo && <div style={{ fontSize: 12, color: t.colors.textMuted, marginTop: 2 }}>{s.memo}</div>}
                    </div>
                    {isDeletingStudio ? (
                      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                        <MgmtCancelBtn onClick={() => setDeleteStudioId(null)} />
                        <button onClick={() => tryDeleteStudio(s.id)} style={{ background: t.colors.danger, color: '#fff', border: 'none', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontFamily: t.font.sans, fontSize: 13, fontWeight: 600 }}>삭제</button>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', gap: 4 }}>
                        <button onClick={() => startEditStudio(s)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, color: t.colors.textMuted }}><Icon name="edit" size={16} /></button>
                        <button onClick={() => tryDeleteStudio(s.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, color: t.colors.textMuted }}><Icon name="trash" size={16} /></button>
                      </div>
                    )}
                  </div>
                )}
                {!isEditingStudio && (
                  <>
                    {studioTeachers.map((tc) => {
                      const isEditingTeacher = editTeacherId === tc.id;
                      const isDeletingTeacher = deleteTeacherId === tc.id;
                      return (
                        <div key={tc.id} style={{ borderBottom: `0.5px solid ${t.colors.border}` }}>
                          {isEditingTeacher ? (
                            <div style={{ padding: '10px 14px 10px 28px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                              <input autoFocus value={teacherForm.name} onChange={e => setTeacherForm({ name: e.target.value })}
                                placeholder="선생님 이름" style={mgmtInputStyle(t)} />
                              <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                                <MgmtCancelBtn onClick={() => setEditTeacherId(null)} /><MgmtSaveBtn onClick={() => saveTeacher(s.id)} />
                              </div>
                            </div>
                          ) : (
                            <div style={{ padding: '10px 14px 10px 28px', display: 'flex', alignItems: 'center', gap: 8 }}>
                              <div style={{ width: 4, height: 4, borderRadius: 2, background: t.colors.textMuted, flexShrink: 0 }} />
                              <span style={{ flex: 1, fontSize: 14, color: t.colors.textSecondary }}>{tc.name}</span>
                              {isDeletingTeacher ? (
                                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                                  <MgmtCancelBtn onClick={() => setDeleteTeacherId(null)} />
                                  <button onClick={() => tryDeleteTeacher(tc.id)} style={{ background: t.colors.danger, color: '#fff', border: 'none', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontFamily: t.font.sans, fontSize: 13, fontWeight: 600 }}>삭제</button>
                                </div>
                              ) : (
                                <div style={{ display: 'flex', gap: 4 }}>
                                  <button onClick={() => startEditTeacher(tc)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, color: t.colors.textMuted }}><Icon name="edit" size={16} /></button>
                                  <button onClick={() => tryDeleteTeacher(tc.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, color: t.colors.textMuted }}><Icon name="trash" size={16} /></button>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {isAddingTeacher && (
                      <div style={{ borderBottom: `0.5px solid ${t.colors.border}`, padding: '10px 14px 10px 28px', display: 'flex', flexDirection: 'column', gap: 8 }}>
                        <input autoFocus value={teacherForm.name} onChange={e => setTeacherForm({ name: e.target.value })}
                          placeholder="선생님 이름" style={mgmtInputStyle(t)} />
                        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                          <MgmtCancelBtn onClick={() => setEditTeacherId(null)} /><MgmtSaveBtn onClick={() => saveTeacher(s.id)} />
                        </div>
                      </div>
                    )}
                    {!isAddingTeacher && (
                      <div style={{ padding: '8px 14px 8px 28px' }}>
                        <button onClick={() => startNewTeacher(s.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: t.colors.primaryDeep, fontFamily: t.font.sans, fontSize: 13, padding: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                          <Icon name="plus" size={13} color={t.colors.primaryDeep} /> 선생님 추가
                        </button>
                      </div>
                    )}
                  </>
                )}
              </div>
            );
          })}
          {editStudioId === 'new' && (
            <div style={{ background: t.colors.surfaceAlt, borderRadius: t.radius.card, border: `0.5px solid ${t.colors.border}`, padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
              <input autoFocus value={studioForm.name} onChange={e => setStudioForm(f => ({ ...f, name: e.target.value }))}
                placeholder="학원 이름" style={mgmtInputStyle(t)} />
              <input value={studioForm.memo} onChange={e => setStudioForm(f => ({ ...f, memo: e.target.value }))}
                placeholder="지역 메모 (예: 강남)" style={{ ...mgmtInputStyle(t), fontSize: 13, color: t.colors.textSecondary }} />
              <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                <MgmtCancelBtn onClick={() => setEditStudioId(null)} /><MgmtSaveBtn onClick={saveStudio} />
              </div>
            </div>
          )}
          {editStudioId !== 'new' && (
            <button onClick={startNewStudio} style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'transparent', border: 'none', cursor: 'pointer', color: t.colors.primaryDeep, fontFamily: t.font.sans, fontSize: 15, fontWeight: 500, padding: '8px 4px' }}>
              <Icon name="plus" size={16} color={t.colors.primaryDeep} /> 학원 추가
            </button>
          )}
        </div>
      </div>
    </>
  );
}

  }, [teachers]);
  _useEffect(() => {
    if (!window.sb || !initialized.current) return;
    window.sb.from('app_data').upsert({ key: 'levels', value: levels, updated_at: new Date().toISOString() })
      .then(({ error }) => { if (error) console.warn('Supabase:', error.message); });
  }, [levels]);
  _useEffect(() => {
    if (!window.sb || !initialized.current) return;
    window.sb.from('app_data').upsert({ key: 'movements', value: movements, updated_at: new Date().toISOString() })
      .then(({ error }) => { if (error) console.warn('Supabase:', error.message); });
  }, [movements]);

  const store = {
    sessions, feedback, studios, teachers, levels, movements,
    createSession(data) {
      const id = Math.max(0, ...sessions.map(s => s.id)) + 1;
      setSessions([...sessions, { id, ...data }]);
      return id;
    },
    updateSession(id, data) {
      setSessions(sessions.map(s => s.id === id ? { ...s, ...data } : s));
    },
    deleteSession(id) {
      setSessions(sessions.filter(s => s.id !== id));
    },
    createFeedback(data) {
      const id = Math.max(0, ...feedback.map(f => f.id)) + 1;
      const now = new Date().toISOString();
      setFeedback([...feedback, { id, createdAt: now, ...data }]);
      return id;
    },
    createStudio(data) {
      const id = Math.max(0, ...studios.map(s => s.id)) + 1;
      setStudios([...studios, { id, ...data }]);
    },
    updateStudio(id, data) {
      setStudios(studios.map(s => s.id === id ? { ...s, ...data } : s));
    },
    deleteStudio(id) {
      setStudios(studios.filter(s => s.id !== id));
    },
    createTeacher(data) {
      const id = Math.max(0, ...teachers.map(t => t.id)) + 1;
      setTeachers([...teachers, { id, ...data }]);
    },
    updateTeacher(id, data) {
      setTeachers(teachers.map(t => t.id === id ? { ...t, ...data } : t));
    },
    deleteTeacher(id) {
      setTeachers(teachers.filter(t => t.id !== id));
    },
    createLevel(data) {
      const id = Math.max(0, ...levels.map(l => l.id)) + 1;
      setLevels([...levels, { id, ...data }]);
    },
    updateLevel(id, data) {
      setLevels(levels.map(l => l.id === id ? { ...l, ...data } : l));
    },
    deleteLevel(id) {
      setLevels(levels.filter(l => l.id !== id));
    },
    updateMovementName(cat, key, en, ko) {
      setMovements(m => ({ ...m, [cat]: m[cat].map(mv => mv.key === key ? { ...mv, en, ko } : mv) }));
    },
    moveMovement(cat, idx, dir) {
      setMovements(m => {
        const arr = [...m[cat]];
        const next = idx + dir;
        if (next < 0 || next >= arr.length) return m;
        [arr[idx], arr[next]] = [arr[next], arr[idx]];
        return { ...m, [cat]: arr };
      });
    },
    addMovement(cat, data) {
      setMovements(m => ({ ...m, [cat]: [...m[cat], data] }));
    },
  };

  const nav = {
    push(screen, params = {}) { setStack(s => [...s, { screen, params }]); },
    replace(screen, params = {}) { setStack(s => [...s.slice(0, -1), { screen, params }]); },
    back() { setStack(s => s.length > 1 ? s.slice(0, -1) : s); },
    reset(screen, params = {}) { setStack([{ screen, params }]); },
  };

  const onTab = (key) => {
    setTab(key);
    const screen = key === 'home' ? 'home' : key === 'movements' ? 'movements' : 'settings';
    nav.reset(screen);
  };

  const top = stack[stack.length - 1];
  const isModal = ['class-new', 'feedback-new'].includes(top.screen);

  const renderScreen = () => {
    const props = { store, nav, params: top.params };
    switch (top.screen) {
      case 'home':            return <HomeScreen {...props} />;
      case 'class-new':       return <NewClassScreen {...props} />;
      case 'class-detail':    return <ClassDetailScreen {...props} />;
      case 'feedback-new':    return <FeedbackNewScreen {...props} />;
      case 'movements':         return <MovementsScreen {...props} />;
      case 'movement-detail':   return <MovementDetailScreen {...props} />;
      case 'settings':          return <SettingsScreen {...props} />;
      case 'studio-manager':    return <StudioManagerScreen {...props} />;
      default:                  return <HomeScreen {...props} />;
    }
  };

  _useEffect(() => {
    const msgListener = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks').classList.add('open');
      } else if (e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks').classList.remove('open');
      }
    };
    window.addEventListener('message', msgListener);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    const jump = document.getElementById('jumpGrid');
    const screens = [
      ['home', '홈'], ['class-new', '수업 생성'], ['class-detail', '수업 상세'],
      ['feedback-new', '피드백 추가'], ['movements', '동작'], ['movement-detail', '동작 히스토리'],
      ['settings', '설정'],
    ];
    jump.innerHTML = '';
    screens.forEach(([s, label]) => {
      const b = document.createElement('button');
      b.textContent = label;
      b.onclick = () => {
        const params = s === 'class-detail' ? { id: 1 }
                    : s === 'movement-detail' ? { key: 'pirouette' }
                    : s === 'feedback-new' ? { sessionId: 1 }
                    : {};
        setStack([{ screen: s, params }]);
      };
      jump.appendChild(b);
    });

    return () => window.removeEventListener('message', msgListener);
  }, []);

  if (loading) {
    const t = window.theme;
    return (
      <div className="stage">
        <PhoneShell>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 14 }}>
            <div style={{ fontFamily: t.font.serif, fontSize: 30, fontStyle: 'italic', color: t.colors.primaryDeep, letterSpacing: -0.5 }}>
              Développé
            </div>
            <div style={{ color: t.colors.textMuted, fontSize: 13 }}>불러오는 중…</div>
          </div>
        </PhoneShell>
      </div>
    );
  }

  return (
    <div className="stage" data-screen-label={`Développé · ${top.screen}`}>
      <PhoneShell>
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          overflow: 'hidden', position: 'relative',
        }}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative', minHeight: 0,
                       ...(IS_MOBILE && !isModal && { paddingBottom: 'max(74px, calc(54px + env(safe-area-inset-bottom)))' }) }}
               key={stack.length + '-' + top.screen}>
            {renderScreen()}
          </div>
          {!isModal && <TabBar current={tab} onChange={onTab} />}
          {top.screen === 'home' && (
            <FAB icon="plus" label="수업 기록" onClick={() => nav.push('class-new')} />
          )}
        </div>
      </PhoneShell>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
